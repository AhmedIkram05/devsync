services:
  devsync-postgres:
    image: postgres:16
    container_name: devsync-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: devsync
      POSTGRES_USER: devsync
      POSTGRES_PASSWORD: devsync
    ports:
      - "5432:5432"
    volumes:
      - devsync-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devsync -d devsync"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  devsync-postgres-data:
